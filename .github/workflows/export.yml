name: Export & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GODOT_VERSION: "4.3"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint:
    name: GDScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install gdtoolkit

      - name: Run gdlint
        run: gdlint scripts/

  export-web:
    name: Export Web
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot imports
        uses: actions/cache@v4
        with:
          path: .godot/imported/
          key: godot-imports-${{ runner.os }}-${{ hashFiles('**/*.import') }}
          restore-keys: |
            godot-imports-${{ runner.os }}-

      - name: Setup export templates
        run: |
          mkdir -p /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv /root/.local/share/godot/templates/${GODOT_VERSION}.stable/* /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ || true

      - name: Import project
        run: godot --headless --import 2>&1 || true
        timeout-minutes: 5

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html
        timeout-minutes: 10

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 14

  export-android:
    name: Export Android
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot imports
        uses: actions/cache@v4
        with:
          path: .godot/imported/
          key: godot-imports-${{ runner.os }}-${{ hashFiles('**/*.import') }}
          restore-keys: |
            godot-imports-${{ runner.os }}-

      - name: Setup export templates
        run: |
          mkdir -p /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv /root/.local/share/godot/templates/${GODOT_VERSION}.stable/* /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ || true

      - name: Setup Android SDK & keystore
        run: |
          mkdir -p /root/.android
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore /root/.android/debug.keystore \
            -storepass android -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 -deststoretype pkcs12

      - name: Import project
        run: godot --headless --import 2>&1 || true
        timeout-minutes: 5

      - name: Export Android APK
        run: |
          mkdir -p build/android
          godot --headless --export-release "Android" build/android/startup-ceo-sim.apk
        timeout-minutes: 10

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/android/
          retention-days: 14

  deploy-web:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: export-web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
