name: Export & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GODOT_VERSION: "4.3"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  export-web:
    name: Export Web
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          # Find where templates actually live in the container
          find / -name "web_*" -o -name "*.stable" -type d 2>/dev/null | head -20 || true
          # Godot in this container looks at /github/home for HOME
          DEST="/github/home/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$DEST"
          # barichello/godot-ci stores templates in /root/.local/share/godot/templates/
          SRC="/root/.local/share/godot/templates/${GODOT_VERSION}.stable"
          if [ -d "$SRC" ]; then
            cp "$SRC"/* "$DEST/" 2>/dev/null || true
          fi
          # Also check alternative location
          SRC2="/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          if [ -d "$SRC2" ]; then
            cp "$SRC2"/* "$DEST/" 2>/dev/null || true
          fi
          echo "=== Templates in DEST ==="
          ls -la "$DEST/" || true
          echo "=== All godot dirs ==="
          find /root/.local/share/godot/ -type f 2>/dev/null | head -30 || true

      - name: Import project
        run: godot --headless --import 2>&1 || true
        timeout-minutes: 5

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html
        timeout-minutes: 10

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 14

  deploy-web:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: export-web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
